[package]
name = "media-admin"
version = "0.1.0"
edition = "2021"

[features]
default = []
cuda = ["whisper-rs/cuda"]

[[bin]]
name = "media-admin"
path = "src-rs/main.rs"

[dependencies]
anyhow = "1"
dotenvy = "0.15"
axum = { version = "0.8.9", features = ["macros", "json"] }
chrono = "0.4"
base64 = "0.22"
hex = "0.4"
reqwest = { version = "0.13.3", features = ["json", "rustls", "stream"], default-features = false }
futures-util = { version = "0.3", default-features = false, features = ["io"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
hound = "3"
whisper-rs = "0.16"
webrtc-vad = "0.4"
hf-hub = { version = "0.5", features = ["tokio"] }
zip = "8.6.0"
sha1 = "0.11.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "migrate"] }
thiserror = "2.0.18"
tokio = { version = "1.5.2", features = ["fs", "macros", "rt-multi-thread", "io-util", "process", "time"] }
tower-http = { version = "0.6.9", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
urlencoding = "2"
